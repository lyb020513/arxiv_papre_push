base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "your_github_name"
repo_name: "cv-arxiv-daily"
show_authors: true
show_links: true
show_badge: true
max_results: 20 # 调低单次拉取量，配合顶会过滤，极大节省 AI Token

publish_readme: true
publish_gitpage: true
publish_wechat: false

json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# ======= 领域配置 =======
keywords:

  "Robot Navigation":
    filters: [
      "Robot Navigation",
      "Autonomous Navigation",
      "Mobile Robot Navigation",
      "Navigation in Unknown Environments"
    ]

  "Path Planning":
    filters: [
      "Path Planning",
      "Motion Planning",
      "Trajectory Planning",
      "Graph-based Planning",
      "Sampling-based Planning"
    ]

  "Planning & Control":
    filters: [
      "Motion Control",
      "Trajectory Optimization",
      "Model Predictive Control",
      "Optimal Control"
    ]

  "Reinforcement Learning Navigation":
    filters: [
      "Reinforcement Learning",
      "Deep Reinforcement Learning",
      "Policy Learning",
      "RL for Navigation",
      "Goal-conditioned RL"
    ]

  "Decision Making":
    filters: [
      "Decision Making",
      "Behavior Planning",
      "Sequential Decision Making"
    ]

  "Autonomous Driving":
    filters: [
      "Autonomous Driving",
      "Motion Planning for Driving",
      "Behavior Planning for Autonomous Vehicles"
    ]