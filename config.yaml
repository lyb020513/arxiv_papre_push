base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "your_github_name"
repo_name: "cv-arxiv-daily"
show_authors: true
show_links: true
show_badge: true
max_results: 20 # 调低单次拉取量，配合顶会过滤，极大节省 AI Token

publish_readme: true
publish_gitpage: true
publish_wechat: false

json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# ======= 专属核心领域配置 =======
keywords:
  "Robotics":
    filters: ["Robotics", "Robot Manipulation", "Legged Locomotion", "Human-Robot Interaction"]
  "Planning and Control":
    filters: ["Trajectory Planning", "Motion Control", "Model Predictive Control", "Path Planning"]
  "Decision Making":
    filters: ["Decision Making", "Behavior Planning", "Motion Planning"]
  "Reinforcement Learning":
    filters: ["Reinforcement Learning", "Deep Reinforcement Learning", "Proximal Policy Optimization", "Q-Learning"]
  "Autonomous Driving":
    filters: ["Autonomous Driving", "Self-driving", "Autonomous Vehicles"]